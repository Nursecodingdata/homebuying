name: Send Subscription Alerts

on:
  workflow_dispatch:
    inputs:
      force_test_item:
        description: "Force one test listing with start date = today + 7 days"
        required: false
        default: "false"
      force_test_name:
        description: "Name for forced test listing"
        required: false
        default: "[TEST] 서울 알림 검증용 일정"
  schedule:
    - cron: "0 22 * * *"

permissions:
  contents: read

jobs:
  alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Restore alert state cache
        id: restore_alert_cache
        uses: actions/cache/restore@v4
        with:
          path: .state/sent-alerts.json
          key: alert-state-${{ github.run_id }}
          restore-keys: |
            alert-state-

      - name: Build latest listings data
        env:
          ALERT_TEST_FORCE_ITEM: ${{ github.event.inputs.force_test_item == 'true' && '1' || '0' }}
          ALERT_TEST_ITEM_NAME: ${{ github.event.inputs.force_test_name }}
        run: npm run data:build

      - name: Send reminders
        env:
          MAIL_HOST: ${{ secrets.MAIL_HOST }}
          MAIL_PORT: ${{ secrets.MAIL_PORT }}
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          ALERT_RECIPIENTS: ${{ secrets.ALERT_RECIPIENTS }}
        run: npm run alerts:send

      - name: Save alert state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .state/sent-alerts.json
          key: alert-state-${{ github.run_id }}
