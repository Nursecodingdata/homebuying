name: Sync Google Calendar

on:
  workflow_dispatch:
  schedule:
    - cron: "30 21 * * *"

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Restore calendar sync cache
        uses: actions/cache/restore@v4
        with:
          path: .state/google-calendar-sync.json
          key: calendar-sync-${{ github.run_id }}
          restore-keys: |
            calendar-sync-

      - name: Build latest listings data
        run: npm run data:build

      - name: Sync schedules to Google Calendar
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
        run: npm run calendar:sync

      - name: Save calendar sync cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .state/google-calendar-sync.json
          key: calendar-sync-${{ github.run_id }}
